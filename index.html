<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CubeTimer Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h1>CubeTimer <span>PRO</span></h1>

    <div class="menu">
      <button>⏱ Cronômetro</button>
      <button>📊 Estatísticas</button>
      <button>⚙ Config</button>
    </div>

    <div class="session-box">
      <p>sessão atual</p>
      <h2>3x3x3</h2>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- SCRAMBLE -->
    <div class="scramble-card">
      <div class="top-row">
        <span>Scramble atual</span>
        <button onclick="novoScramble()">Novo</button>
      </div>
      <div id="scramble" class="scramble"></div>
    </div>

    <!-- TIMER -->
    <div class="timer-area">
      <div id="timer" class="timer">00.00</div>

      <div class="stats">
        <span id="ao5">ao5: --</span>
        <span id="ao12">ao12: --</span>
      </div>

      <div class="hint">Pressione ESPAÇO</div>
    </div>

    <!-- TABLE + GRAPH -->
    <div class="bottom">

      <div class="table-box">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>tempo</th>
              <th>ao5</th>
              <th>ao12</th>
            </tr>
          </thead>
          <tbody id="tabela"></tbody>
        </table>
      </div>

      <canvas id="grafico"></canvas>

    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
