<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CubeTimer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <div class="brand-icon">CT</div>
        <div class="brand-text">
          <h1>CubeTimer</h1>
          <p>Professional Timer UI</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" type="button">Dashboard</button>
        <button class="nav-item" type="button">Statistics</button>
        <button class="nav-item" type="button">History</button>
        <button class="nav-item" type="button">Session</button>
      </nav>

      <div class="side-card">
        <span class="side-label">Current event</span>
        <strong>3x3 Cube</strong>
      </div>

      <div class="side-card">
        <span class="side-label">Best solve</span>
        <strong id="bestTime">--</strong>
      </div>

      <div class="side-card">
        <span class="side-label">Average</span>
        <strong id="avgTime">--</strong>
      </div>

      <div class="side-actions">
        <button id="newScramble" class="btn btn-primary" type="button">New scramble</button>
        <button id="inspectionToggle" class="btn btn-secondary active" type="button">Inspection: ON</button>
        <button id="copyScramble" class="btn btn-secondary" type="button">Copy scramble</button>
        <button id="clearAll" class="btn btn-danger" type="button">Clear solves</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar-card">
        <div class="topbar-left">
          <span class="mini-label">Current scramble</span>
          <div id="scramble" class="scramble-text">R U R' U' F2 L D2 B' U2 R2</div>
        </div>

        <div id="status" class="status-badge">Ready</div>
      </header>

      <section class="hero-panel">
        <div class="hero-metrics">
          <div class="metric-box">
            <span>ao5</span>
            <strong id="ao5">--</strong>
          </div>

          <div class="metric-box">
            <span>ao12</span>
            <strong id="ao12">--</strong>
          </div>
        </div>

        <div class="timer-zone" id="timerZone">
          <div id="inspection" class="inspection hidden">15</div>
          <div id="timer" class="timer-display">00:00.000</div>
          <p class="timer-hint">Hold <strong>Space</strong> and release to start</p>
        </div>
      </section>

      <section class="stats-strip">
        <article class="info-card">
          <span class="mini-label">Solves</span>
          <strong id="solveCount">0</strong>
        </article>

        <article class="info-card">
          <span class="mini-label">Last solve</span>
          <strong id="lastTime">--</strong>
        </article>

        <article class="info-card">
          <span class="mini-label">Inspection</span>
          <strong id="inspectionState">Enabled</strong>
        </article>
      </section>

      <section class="bottom-grid">
        <article class="panel-box chart-panel">
          <div class="panel-head">
            <h2>Progress</h2>
          </div>
          <canvas id="chartCanvas"></canvas>
        </article>

        <article class="panel-box table-panel">
          <div class="panel-head">
            <h2>Recent solves</h2>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Time</th>
                  <th>Scramble</th>
                </tr>
              </thead>
              <tbody id="historyTable"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
